<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maschinenprofi STMK</title>
    
    <!-- Design & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat Bibliotheken -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .nav-shadow { shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden select-none">
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // EGON: DEINE ECHTEN CLOUD-DATEN VOM FOTO
        // =========================================================================
        const FIREBASE_PROFI_CONFIG = {
            apiKey: "AIzaSyBHnrDnb8ERfN9C9E_xS7b2JsPHB6KnLAk",           
            authDomain: "maschinenprofi-cloud.firebaseapp.com",
            projectId: "maschinenprofi-cloud",          
            storageBucket: "maschinenprofi-cloud.firebasestorage.app",
            messagingSenderId: "907998743571",
            appId: "1:907998743571:web:a63f48686cb1fbf10ac3e6"
        };
        const APP_ID = "maschinenprofi-cloud";
        // =========================================================================

        const { useState, useEffect, useMemo } = React;

        // Icons als einfache SVG-Funktionen
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconStats = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>;
        const IconHistory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconUsers = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
        const IconMachine = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 11V7h10v4"/><rect x="3" y="11" width="18" height="6" rx="2"/><circle cx="7" y="20" r="2"/><circle cx="17" y="20" r="2"/></svg>;

        function App() {
            const [view, setView] = useState('dashboard');
            const [rentals, setRentals] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [machines, setMachines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const startApp = async () => {
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_PROFI_CONFIG);
                        const db = firebase.firestore();
                        const auth = firebase.auth();

                        await auth.signInAnonymously();

                        const rootRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');

                        // Synchronisierung Rentals
                        rootRef.collection('rentals').onSnapshot(snap => {
                            const data = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                            setRentals(data.sort((a,b) => new Date(b.date) - new Date(a.date)));
                            setLoading(false);
                            setError(null);
                        }, err => setError("Datenbank-Fehler. Bitte Regeln in Firebase prüfen!"));

                        // Synchronisierung Customers
                        rootRef.collection('customers').onSnapshot(snap => {
                            setCustomers(snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b) => a.name.localeCompare(b.name)));
                        });

                        // Synchronisierung Machines
                        rootRef.collection('machines').onSnapshot(snap => {
                            setMachines(snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b) => a.name.localeCompare(b.name)));
                        });

                    } catch (e) {
                        setError("Startfehler: " + e.message);
                        setLoading(false);
                    }
                };
                startApp();
            }, []);

            const stats = useMemo(() => {
                const active = rentals.filter(r => !r.endReading);
                const billedFällig = rentals.filter(r => r.endReading && !r.billed);
                const openHours = billedFällig.reduce((sum, r) => sum + (Number(r.endReading) - Number(r.startReading)), 0);
                return { active, billedFällig, openHours };
            }, [rentals]);

            if (error) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-6 text-center">
                    <div className="bg-rose-500 text-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm">
                        <div className="font-black uppercase tracking-widest text-lg mb-2 leading-none">Fehler</div>
                        <div className="text-sm font-bold opacity-90 mb-6 leading-tight">{error}</div>
                        <button onClick={() => window.location.reload()} className="bg-white text-rose-500 px-8 py-3 rounded-2xl font-black uppercase text-xs">Neu laden</button>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-amber-500">
                    <div className="animate-bounce text-5xl mb-4">🚜</div>
                    <p className="font-black italic uppercase tracking-widest text-xs">Cloud wird geladen...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-100 pb-32">
                    <header className="bg-slate-950 text-white pt-8 pb-6 px-6 shadow-2xl sticky top-0 z-50 border-b border-amber-500/20 text-center">
                        <h1 className="text-2xl font-black italic text-amber-500 tracking-tighter leading-none mb-1">MASCHINENPROFI</h1>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Echtzeit Cloud Steiermark</p>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {view === 'dashboard' && <Dashboard stats={stats} rentals={rentals} />}
                        {view === 'new' && <EntryForm machines={machines} customers={customers} rentals={rentals} setView={setView} />}
                        {view === 'history' && <History rentals={rentals} />}
                        {view === 'customers' && <ListView title="Kundenverwaltung" items={customers} coll="customers" />}
                        {view === 'machines' && <ListView title="Maschinenpark" items={machines} coll="machines" isMachine />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-950 text-white h-24 flex items-center shadow-2xl z-50">
                        <NavBtn active={view === 'new'} icon={<IconPlus />} label="NEU" onClick={() => setView('new')} primary />
                        <NavBtn active={view === 'dashboard'} icon={<IconStats />} label="STATUS" onClick={() => setView('dashboard')} />
                        <NavBtn active={view === 'history'} icon={<IconHistory />} label="VERLAUF" onClick={() => setView('history')} />
                        <NavBtn active={view === 'customers'} icon={<IconUsers />} label="KUNDEN" onClick={() => setView('customers')} />
                        <NavBtn active={view === 'machines'} icon={<IconMachine />} label="GERÄTE" onClick={() => setView('machines')} />
                    </nav>
                </div>
            );
        }

        // --- DASHBOARD ---
        function Dashboard({ stats, rentals }) {
            const [editId, setEditId] = useState(null);
            const [val, setVal] = useState('');

            const finish = async (id, start) => {
                if (!val || Number(val) <= start) return alert("Endstand muss höher sein als Startstand!");
                const db = firebase.firestore();
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('rentals').doc(id).update({ 
                    endReading: Number(val),
                    status: 'abgeschlossen'
                });
                setEditId(null); setVal('');
            };

            const bill = async (id) => {
                const db = firebase.firestore();
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('rentals').doc(id).update({ billed: true });
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-[2rem] shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1 leading-none tracking-widest">Aktiv</span>
                            <div className="text-3xl font-black text-amber-500 tabular-nums leading-none">{stats.active.length}</div>
                        </div>
                        <div className="bg-white p-5 rounded-[2rem] shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1 leading-none tracking-widest">Offen (h)</span>
                            <div className="text-3xl font-black text-emerald-500 tabular-nums leading-none">{stats.openHours.toFixed(1)}</div>
                        </div>
                    </div>

                    {stats.active.length > 0 && <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Laufende Einsätze</h2>}
                    {stats.active.map(r => (
                        <div key={r.id} className="bg-amber-50 p-6 rounded-[2.5rem] border-2 border-amber-200 shadow-sm">
                            <div className="flex justify-between font-black uppercase mb-1 text-lg leading-tight truncate"><span>{r.customer}</span><span>{r.startReading}h</span></div>
                            <div className="text-[10px] font-bold text-amber-700 uppercase mb-4 tracking-widest">{r.machine}</div>
                            {editId === r.id ? (
                                <div className="flex gap-2">
                                    <input type="number" className="flex-1 p-4 rounded-2xl font-black text-lg outline-none border-2 border-amber-300" value={val} onChange={e=>setVal(e.target.value)} placeholder="Endstand" />
                                    <button onClick={()=>finish(r.id, r.startReading)} className="bg-slate-900 text-white px-5 rounded-2xl font-bold uppercase text-xs italic">OK</button>
                                </div>
                            ) : (
                                <button onClick={()=>setEditId(r.id)} className="w-full bg-amber-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-transform uppercase tracking-widest text-xs italic leading-none">Einsatz Beenden</button>
                            )}
                        </div>
                    ))}

                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <h2 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest text-center">Fällige Abrechnungen</h2>
                        {stats.billedFällig.length === 0 ? <p className="text-center text-slate-300 py-6 font-bold text-xs uppercase">Alles erledigt</p> : stats.billedFällig.map(r => (
                            <div key={r.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 border border-slate-100">
                                <div className="font-bold text-xs truncate max-w-[120px] leading-tight"><div>{r.customer}</div><div className="text-[8px] text-slate-400 mt-1 uppercase">{r.machine}</div></div>
                                <div className="flex items-center gap-3"><span className="font-black text-emerald-600">{(r.endReading-r.startReading).toFixed(1)}h</span><button onClick={()=>bill(r.id)} className="bg-emerald-500 text-white w-10 h-10 rounded-xl font-bold flex items-center justify-center">✓</button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- NEUAUFNAHME ---
        function EntryForm({ machines, customers, rentals, setView }) {
            const [f, setF] = useState({c: '', nc: '', m: '', s: '', d: new Date().toISOString().split('T')[0]});

            useEffect(() => {
                if (f.m) {
                    const last = rentals.filter(r => r.machine === f.m && r.endReading).sort((a,b) => new Date(b.date)-new Date(a.date))[0];
                    setF(prev => ({...prev, s: last ? last.endReading : ''}));
                }
            }, [f.m, rentals]);

            const save = async () => {
                const cust = f.nc.trim() || f.c;
                if (!cust || !f.m || f.s === '') return alert("Bitte Kunde, Maschine und Startstand ausfüllen!");
                const db = firebase.firestore();
                const root = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                await root.collection('rentals').add({ customer: cust, machine: f.m, startReading: Number(f.s), endReading: null, date: f.d, billed: false, status: 'laufend' });
                if (f.nc.trim() && !customers.some(c => c.name === cust)) await root.collection('customers').add({ name: cust });
                setView('dashboard');
            };

            return (
                <div className="bg-white p-8 rounded-[3rem] shadow-xl space-y-6 animate-in zoom-in-95 duration-300">
                    <h2 className="text-xl font-black italic uppercase border-b-4 border-amber-500 inline-block pb-1 leading-none">Neuaufnahme</h2>
                    <div className="space-y-4">
                        <select className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-slate-200" value={f.c} onChange={e=>setF({...f, c:e.target.value, nc:''})}>
                            <option value="">Kunde wählen...</option>{customers.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                        </select>
                        <input className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-slate-200" placeholder="Neuer Kunde..." value={f.nc} onChange={e=>setF({...f, nc:e.target.value, c:''})} />
                        <select className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none border border-slate-200" value={f.m} onChange={e=>setF({...f, m:e.target.value})}>
                            <option value="">Gerät wählen...</option>{machines.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
                        </select>
                        <div className="text-center pt-2">
                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Startstand (h)</label>
                            <input type="number" className="w-full bg-slate-100 p-5 rounded-2xl font-black text-3xl text-amber-600 text-center outline-none" value={f.s} onChange={e=>setF({...f, s:e.target.value})} />
                        </div>
                    </div>
                    <button onClick={save} className="w-full bg-slate-950 text-white py-5 rounded-3xl font-black italic shadow-2xl active:scale-95 transition-transform mt-4 uppercase tracking-widest leading-none">SPEICHERN</button>
                    <button onClick={() => setView('dashboard')} className="w-full text-slate-400 font-bold uppercase text-[10px] py-2 tracking-widest leading-none">Abbrechen</button>
                </div>
            );
        }

        // --- VERLAUF ---
        function History({ rentals }) {
            const del = async (id) => {
                if(confirm("Diesen Einsatz löschen?")) {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('rentals').doc(id).delete();
                }
            };
            return (
                <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                    <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Einsatz-Verlauf</h2>
                    {rentals.length === 0 ? <p className="text-center py-12 text-slate-300 font-bold uppercase">Keine Daten vorhanden</p> : rentals.map(r => (
                        <div key={r.id} className={`bg-white p-5 rounded-[2rem] shadow-sm border-l-8 ${r.endReading ? 'border-emerald-500' : 'border-amber-500 animate-pulse'}`}>
                            <div className="flex justify-between items-center">
                                <div className="truncate pr-4 leading-tight">
                                    <div className="font-black uppercase italic truncate text-lg leading-none mb-1">{r.customer}</div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{r.machine} • {new Date(r.date).toLocaleDateString('de-AT')}</div>
                                </div>
                                <div className="text-right shrink-0">
                                    <div className="font-black text-amber-500 text-2xl tabular-nums leading-none">{r.endReading ? (r.endReading-r.startReading).toFixed(1)+'h' : 'LÄUFT'}</div>
                                    <button onClick={()=>del(r.id)} className="text-rose-300 text-[9px] font-black uppercase mt-1 tracking-widest leading-none">Löschen</button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // --- LISTEN (KUNDEN / MASCHINEN) ---
        function ListView({ title, items, coll, isMachine }) {
            const [name, setName] = useState('');
            
            const add = async () => {
                if (!name.trim()) return;
                const db = firebase.firestore();
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection(coll).add({ name: name.trim() });
                setName('');
            };

            const del = async (id) => {
                if(confirm("Diesen Eintrag wirklich löschen?")) {
                    await firebase.firestore().collection('artifacts').doc(APP_ID).collection('public').doc('data').collection(coll).doc(id).delete();
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">{title}</h2>
                    <div className="bg-white p-4 rounded-[2rem] shadow-sm flex gap-2">
                        <input className="flex-1 bg-slate-50 border-none rounded-xl px-4 py-3 font-bold" placeholder="Neu anlegen..." value={name} onChange={e=>setName(e.target.value)} />
                        <button onClick={add} className="bg-amber-500 text-white px-6 rounded-xl font-black">+</button>
                    </div>
                    <div className="space-y-2">
                        {items.map(item => (
                            <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-white hover:border-slate-200 transition-all">
                                <span className="font-black uppercase text-sm italic tracking-tight">{item.name}</span>
                                <button onClick={()=>del(item.id)} className="text-rose-300 hover:text-rose-500 transition-colors"><Trash2Icon /></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const Trash2Icon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        );

        function NavBtn({ icon, label, onClick, active, primary }) {
            return (
                <button onClick={onClick} className={`flex-1 flex flex-col items-center justify-center gap-1 transition-all ${active ? 'text-amber-500' : 'text-slate-500'} ${primary ? 'bg-amber-500 !text-slate-950 h-full border-x border-slate-900/10' : ''}`}>
                    <span className={primary ? 'scale-125' : ''}>{icon}</span><span className="text-[9px] font-black uppercase tracking-widest mt-1 leading-none">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
