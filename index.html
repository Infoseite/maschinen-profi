<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maschinenprofi STMK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%230f172a'/%3E%3Cpath d='M20 70 L80 70 L75 40 L25 40 Z' fill='%23f59e0b'/%3E%3Crect x='45' y='25' width='10' height='15' fill='%23f59e0b'/%3E%3C/svg%3E">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%230f172a'/%3E%3Cpath d='M20 70 L80 70 L75 40 L25 40 Z' fill='%23f59e0b'/%3E%3Crect x='45' y='25' width='10' height='15' fill='%23f59e0b'/%3E%3C/svg%3E">
    
    <!-- Firebase Bibliotheken (WICHTIG: Compat-Version für einfache Nutzung) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // ============================================================
        // !!! EGON: HIER DEINE ECHTEN DATEN VON GOOGLE EINSETZEN !!!
        // ============================================================
        const firebaseConfig = {
            apiKey: "HIER_DEIN_API_KEY",           
            authDomain: "DEIN_PROJEKT.firebaseapp.com",
            projectId: "DEIN_PROJEKT_ID",          
            storageBucket: "DEIN_PROJEKT.appspot.com",
            messagingSenderId: "DEINE_ID",
            appId: "DEINE_APP_ID"
        };
        // ============================================================

        // HIER IST DER ZÜNDSCHLÜSSEL - Fest eingebaut!
        // (Entspricht dem 'const app = initializeApp' von Google)
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [view, setView] = useState('dashboard');
            const [rentals, setRentals] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [machines, setMachines] = useState([]);
            const [baseHours, setBaseHours] = useState({});
            const [loading, setLoading] = useState(true);
            const [connectionError, setConnectionError] = useState(null);

            useEffect(() => {
                // Prüfen ob die Keys noch die Platzhalter sind
                if (firebaseConfig.apiKey === "HIER_DEIN_API_KEY") {
                    setConnectionError("Bitte trage zuerst deine Firebase-Daten im Code ein!");
                    setLoading(false);
                    return;
                }

                auth.signInAnonymously().catch(err => {
                    console.error("Auth Fehler", err);
                    setConnectionError("Cloud-Verbindung fehlgeschlagen. Stimmen die Keys?");
                });
                
                const unsubRentals = db.collection('rentals').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRentals(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                    setLoading(false);
                    setConnectionError(null);
                }, (err) => {
                    console.error("Firestore Fehler", err);
                    setConnectionError("Datenbank-Fehler. Testmodus in Firebase aktiv?");
                    setLoading(false);
                });

                const unsubMachines = db.collection('machines').onSnapshot(snap => {
                    const data = snap.docs.map(doc => doc.data().name);
                    setMachines(data.sort());
                    const hours = {};
                    snap.docs.forEach(doc => hours[doc.data().name] = doc.data().base || 0);
                    setBaseHours(hours);
                });

                const unsubCustomers = db.collection('customers').onSnapshot(snap => {
                    const data = snap.docs.map(doc => doc.data().name);
                    setCustomers(data.sort());
                });

                return () => { unsubRentals(); unsubMachines(); unsubCustomers(); };
            }, []);

            const stats = useMemo(() => {
                const openRentals = rentals.filter(r => !r.billed && r.endReading);
                const openHours = openRentals.reduce((sum, r) => sum + (parseFloat(r.endReading) - parseFloat(r.startReading)), 0);
                const active = rentals.filter(r => !r.endReading).length;
                return { openHours, active };
            }, [rentals]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-slate-900 text-amber-500 font-black italic p-8 text-center uppercase tracking-widest">
                    Verbinde mit Cloud...
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-slate-900 text-white p-6 shadow-2xl sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black italic text-amber-500 tracking-tighter leading-none">MASCHINENPROFI</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Cloud-System</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${connectionError ? 'bg-rose-500' : 'bg-emerald-500 animate-pulse'}`}></div>
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">{connectionError ? 'Offline' : 'Live'}</span>
                            </div>
                        </div>
                    </header>

                    {connectionError && (
                        <div className="max-w-4xl mx-auto p-4 animate-bounce">
                            <div className="bg-rose-600 text-white p-6 rounded-[2rem] shadow-xl text-center">
                                <div className="font-black uppercase tracking-widest text-xs">{connectionError}</div>
                            </div>
                        </div>
                    )}

                    <main className="max-w-4xl mx-auto p-4 space-y-6">
                        {!connectionError && view === 'dashboard' && <Dashboard stats={stats} rentals={rentals} db={db} />}
                        {!connectionError && view === 'new' && <EntryForm machines={machines} customers={customers} baseHours={baseHours} rentals={rentals} setView={setView} db={db} />}
                        {!connectionError && view === 'history' && <History rentals={rentals} db={db} />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white h-20 flex border-t border-slate-800 px-2 shadow-inner z-50">
                        <NavButton active={view === 'new'} icon="➕" label="NEU" onClick={() => setView('new')} primary />
                        <NavButton active={view === 'dashboard'} icon="📊" label="ST" onClick={() => setView('dashboard')} />
                        <NavButton active={view === 'history'} icon="📜" label="V" onClick={() => setView('history')} />
                        <NavButton active={false} icon="👥" label="K" onClick={() => alert('Kunden werden automatisch gespeichert')} />
                        <NavButton active={false} icon="🚜" label="G" onClick={() => alert('Geräte direkt in Firebase verwalten')} />
                    </nav>
                </div>
            );
        }

        function Dashboard({ stats, rentals, db }) {
            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border-2 border-white">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Einsätze</span>
                            <div className="text-3xl font-black text-amber-500 tabular-nums">{stats.active}</div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border-2 border-white">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Offen (h)</span>
                            <div className="text-3xl font-black text-emerald-500 tabular-nums">{stats.openHours.toFixed(1)}</div>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm">
                        <h2 className="font-black italic uppercase text-slate-400 text-[10px] tracking-widest mb-4">Abrechnung fällig</h2>
                        <div className="space-y-3">
                            {rentals.filter(r => !r.billed && r.endReading).length === 0 ? (
                                <p className="text-slate-200 text-center py-8 font-black uppercase text-[10px] tracking-widest">Keine offenen Posten.</p>
                            ) : (
                                rentals.filter(r => !r.billed && r.endReading).map(r => (
                                    <div key={r.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div>
                                            <span className="font-bold block leading-none mb-1">{r.customer}</span>
                                            <span className="text-[10px] text-slate-400 font-bold uppercase">{r.machine}</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="font-black text-amber-500">{(r.endReading - r.startReading).toFixed(1)} h</span>
                                            <button onClick={() => db.collection('rentals').doc(r.id).update({ billed: true })} className="bg-emerald-500 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold">✓</button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function EntryForm({ machines, customers, baseHours, rentals, setView, db }) {
            const [form, setForm] = useState({
                customer: '', newCustomer: '', machine: '',
                startReading: '', endReading: '', date: new Date().toISOString().split('T')[0], notes: ''
            });

            useEffect(() => {
                if (form.machine) {
                    const machineRentals = rentals.filter(r => r.machine === form.machine && r.endReading).sort((a,b) => new Date(b.date) - new Date(a.date));
                    const lastValue = machineRentals.length > 0 ? machineRentals[0].endReading : (baseHours[form.machine] || 0);
                    setForm(f => ({ ...f, startReading: lastValue }));
                }
            }, [form.machine, baseHours]);

            const save = async () => {
                const finalCust = form.newCustomer.trim() || form.customer;
                if (!finalCust || !form.machine || !form.startReading) return alert("Pflichtfelder fehlen!");
                await db.collection('rentals').add({
                    customer: finalCust, machine: form.machine, 
                    startReading: parseFloat(form.startReading),
                    endReading: form.endReading ? parseFloat(form.endReading) : null,
                    date: form.date, notes: form.notes, billed: false
                });
                if (form.newCustomer.trim() && !customers.includes(finalCust)) {
                    await db.collection('customers').add({ name: finalCust.trim() });
                }
                setView('dashboard');
            };

            return (
                <div className="bg-white p-8 rounded-[3rem] shadow-xl space-y-6 animate-in zoom-in-95 duration-300">
                    <h2 className="text-2xl font-black italic uppercase tracking-tighter border-b-4 border-amber-500 inline-block pb-1 leading-none">Neuaufnahme</h2>
                    <div className="space-y-4">
                        <select className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold" value={form.customer} onChange={e => setForm({...form, customer: e.target.value, newCustomer: ''})}>
                            <option value="">Kunde wählen...</option>
                            {customers.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <input className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold" placeholder="Oder neuer Name..." value={form.newCustomer} onChange={e => setForm({...form, newCustomer: e.target.value, customer: ''})} />
                        <select className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold" value={form.machine} onChange={e => setForm({...form, machine: e.target.value})}>
                            <option value="">Gerät wählen...</option>
                            {machines.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-2 text-center">
                            <label className="text-[10px] font-black uppercase text-slate-400">Start</label>
                            <input type="number" className="w-full bg-slate-100 p-5 rounded-2xl font-black text-2xl text-amber-600 outline-none" value={form.startReading} onChange={e => setForm({...form, startReading: e.target.value})} />
                        </div>
                        <div className="space-y-2 text-center">
                            <label className="text-[10px] font-black uppercase text-slate-400">Ende</label>
                            <input type="number" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl font-black text-2xl outline-none" value={form.endReading} onChange={e => setForm({...form, endReading: e.target.value})} placeholder="..." />
                        </div>
                    </div>
                    <button onClick={save} className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-xl italic shadow-2xl active:scale-95 transition-all uppercase tracking-widest">Speichern</button>
                </div>
            );
        }

        function History({ rentals, db }) {
            return (
                <div className="space-y-4 animate-in slide-in-from-bottom-4">
                    {rentals.map(r => (
                        <div key={r.id} className={`bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center border-l-8 ${r.endReading ? 'border-emerald-500' : 'border-amber-500 animate-pulse'}`}>
                            <div>
                                <span className="font-black uppercase italic block text-lg leading-tight mb-1">{r.customer}</span>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{r.machine} • {new Date(r.date).toLocaleDateString('de-AT')}</span>
                                <div className="text-[10px] text-slate-300 mt-1 font-bold leading-none">{r.startReading} → {r.endReading || 'läuft...'}</div>
                            </div>
                            <div className="text-right">
                                <div className="font-black text-2xl text-amber-500 tabular-nums leading-none">{r.endReading ? (r.endReading - r.startReading).toFixed(1) + ' h' : 'OFFEN'}</div>
                                <button onClick={() => {if(confirm("Eintrag löschen?")) db.collection('rentals').doc(r.id).delete()}} className="text-rose-300 text-[9px] font-black uppercase mt-1 tracking-widest">Löschen</button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function NavButton({ icon, label, onClick, active, primary }) {
            return (
                <button onClick={onClick} className={`flex-1 flex flex-col items-center justify-center gap-1 transition-all ${active ? 'text-amber-500' : 'text-slate-500'} ${primary ? 'bg-amber-500 !text-slate-900 !rounded-t-3xl -mt-4 shadow-2xl h-24' : ''}`}>
                    <span className={primary ? 'text-2xl' : 'text-xl'}>{icon}</span>
                    <span className="text-[10px] font-black uppercase tracking-tighter leading-none">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
