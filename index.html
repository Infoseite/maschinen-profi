<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maschinenprofi STMK</title>
    
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat Bibliotheken (Stabil für Single-Files) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // WICHTIG: TRAGE HIER DEINE DATEN AUS DER FIREBASE-KONSOLE EIN!
        // (Du findest diese unter: Projekt-Einstellungen -> Web-App-Konfiguration)
        // =========================================================================
        const MANUELLE_CONFIG = {
            apiKey: "HIER_API_KEY_EINTRAGEN",
            authDomain: "DEIN_PROJEKT.firebaseapp.com",
            projectId: "DEINE_PROJEKT_ID",
            storageBucket: "DEIN_PROJEKT.appspot.com",
            messagingSenderId: "DEINE_ID",
            appId: "DEINE_APP_ID"
        };
        // =========================================================================

        const { useState, useEffect, useMemo } = React;

        // Icons
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconStats = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>;
        const IconHistory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconUsers = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
        const IconTractor = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 11 2-2-2-2"/><path d="M11 11V7"/><path d="M15 11v-4"/><path d="M19 11v-4"/><rect x="2" y="15" width="20" height="4" rx="1"/></svg>;

        function App() {
            const [view, setView] = useState('dashboard');
            const [rentals, setRentals] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [machines, setMachines] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [user, setUser] = useState(null);

            // 1. Initialisierung und Authentifizierung (Regel 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        let config;
                        try {
                            config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MANUELLE_CONFIG;
                        } catch(e) {
                            config = MANUELLE_CONFIG;
                        }

                        if (config.apiKey === "HIER_API_KEY_EINTRAGEN" && typeof __firebase_config === 'undefined') {
                            setError("Firebase-Daten fehlen. Bitte trage deine Daten im Code ein.");
                            setLoading(false);
                            return;
                        }

                        if (!firebase.apps.length) firebase.initializeApp(config);
                        
                        const auth = firebase.auth();
                        
                        // Zuerst anmelden und await verwenden
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        // Auth-Status Listener setzen
                        const unsubscribe = auth.onAuthStateChanged((u) => {
                            setUser(u);
                        });

                        return () => unsubscribe();
                    } catch (e) {
                        setError("Startfehler bei der Anmeldung: " + e.message);
                        setLoading(false);
                    }
                };

                initAuth();
            }, []);

            // 2. Daten laden erst NACH erfolgreicher Anmeldung (Regel 3)
            useEffect(() => {
                if (!user) return;

                const db = firebase.firestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                
                // Pfad für öffentliche Daten (Regel 1)
                const rootRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                // Daten-Abonnement (Regel 2: Keine komplexen Queries)
                const unsubRentals = rootRef.collection('rentals').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setRentals(data.sort((a,b) => new Date(b.date) - new Date(a.date)));
                    setLoading(false);
                }, err => {
                    console.error("Firestore Fehler (Rentals):", err);
                    setError("Zugriff verweigert oder Datenbankfehler.");
                });

                const unsubCustomers = rootRef.collection('customers').onSnapshot(snap => {
                    setCustomers(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                }, err => console.error("Firestore Fehler (Customers):", err));

                const unsubMachines = rootRef.collection('machines').onSnapshot(snap => {
                    setMachines(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                }, err => console.error("Firestore Fehler (Machines):", err));

                return () => {
                    unsubRentals();
                    unsubCustomers();
                    unsubMachines();
                };
            }, [user]);

            const stats = useMemo(() => {
                const active = rentals.filter(r => !r.endReading);
                const billedFällig = rentals.filter(r => r.endReading && !r.billed);
                const openHours = billedFällig.reduce((sum, r) => sum + (Number(r.endReading) - Number(r.startReading)), 0);
                return { active, billedFällig, openHours };
            }, [rentals]);

            if (error) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
                    <div className="bg-rose-500 text-white p-6 rounded-3xl shadow-2xl text-center">
                        <div className="font-black mb-2 uppercase tracking-widest">Achtung</div>
                        <div className="text-sm font-bold">{error}</div>
                        <button 
                            onClick={() => window.location.reload()}
                            className="mt-4 bg-white text-rose-500 px-4 py-2 rounded-xl font-bold uppercase text-xs"
                        >
                            Neu laden
                        </button>
                    </div>
                </div>
            );

            if (!user || (loading && rentals.length === 0)) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-amber-500">
                    <div className="animate-bounce text-4xl mb-4">🚜</div>
                    <p className="font-black italic uppercase tracking-widest text-sm">Verbinde mit Cloud...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-slate-950 text-white pt-8 pb-6 px-6 shadow-2xl sticky top-0 z-50">
                        <div className="max-w-md mx-auto flex justify-between items-end">
                            <div>
                                <h1 className="text-2xl font-black italic text-amber-500 tracking-tighter leading-none mb-1">MASCHINENPROFI</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Live Cloud-System</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6">
                        {view === 'dashboard' && <Dashboard stats={stats} rentals={rentals} />}
                        {view === 'new' && <EntryForm machines={machines} customers={customers} rentals={rentals} setView={setView} />}
                        {view === 'history' && <History rentals={rentals} />}
                        {view === 'customers' && <ListView title="Kunden" items={customers} coll="customers" />}
                        {view === 'machines' && <ListView title="Geräte" items={machines} coll="machines" showBase />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-950 text-white h-24 flex items-center border-t border-slate-800 shadow-[0_-10px_25px_rgba(0,0,0,0.3)] z-50">
                        <NavBtn active={view === 'new'} icon={<IconPlus />} label="NEU" onClick={() => setView('new')} primary />
                        <NavBtn active={view === 'dashboard'} icon={<IconStats />} label="ST" onClick={() => setView('dashboard')} />
                        <NavBtn active={view === 'history'} icon={<IconHistory />} label="V" onClick={() => setView('history')} />
                        <NavBtn active={view === 'customers'} icon={<IconUsers />} label="K" onClick={() => setView('customers')} />
                        <NavBtn active={view === 'machines'} icon={<IconTractor />} label="G" onClick={() => setView('machines')} />
                    </nav>
                </div>
            );
        }

        // --- Komponenten ---

        function Dashboard({ stats, rentals }) {
            const [editId, setEditId] = useState(null);
            const [val, setVal] = useState('');

            const finish = async (id, start) => {
                if (!val || Number(val) <= start) return alert("Endstand muss höher sein!");
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('rentals').doc(id).update({ endReading: Number(val) });
                setEditId(null); setVal('');
            };

            const markBilled = async (id) => {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('rentals').doc(id).update({ billed: true });
            };

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Aktiv</span>
                            <div className="text-3xl font-black text-amber-500">{stats.active.length}</div>
                        </div>
                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200">
                            <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Offen (h)</span>
                            <div className="text-3xl font-black text-emerald-500">{stats.openHours.toFixed(1)}</div>
                        </div>
                    </div>

                    {stats.active.map(r => (
                        <div key={r.id} className="bg-amber-50 p-5 rounded-[2rem] border-2 border-amber-200 shadow-sm animate-pulse-slow">
                            <div className="flex justify-between font-black uppercase mb-1 text-lg"><span>{r.customer}</span><span>{r.startReading}h</span></div>
                            <div className="text-[10px] font-bold text-amber-700 uppercase mb-4">{r.machine}</div>
                            {editId === r.id ? (
                                <div className="flex gap-2">
                                    <input type="number" className="flex-1 p-3 rounded-xl font-bold outline-none" value={val} onChange={e=>setVal(e.target.value)} placeholder="Endstand" />
                                    <button onClick={()=>finish(r.id, r.startReading)} className="bg-slate-900 text-white p-3 rounded-xl font-bold">OK</button>
                                </div>
                            ) : (
                                <button onClick={()=>setEditId(r.id)} className="w-full bg-amber-500 text-white font-black py-3 rounded-2xl shadow-lg active:scale-95 transition-transform">EINSATZ BEENDEN</button>
                            )}
                        </div>
                    ))}

                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <h2 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest text-center">Abrechnung fällig</h2>
                        {stats.billedFällig.length === 0 ? <p className="text-center text-slate-300 py-4 font-bold text-sm">KEINE OFFENEN POSTEN</p> : stats.billedFällig.map(r => (
                            <div key={r.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl mb-2 border border-slate-100">
                                <div className="font-bold text-xs truncate max-w-[120px]"><div>{r.customer}</div><div className="text-[8px] text-slate-400 mt-1 uppercase">{r.machine}</div></div>
                                <div className="flex items-center gap-3"><span className="font-black text-emerald-600">{(r.endReading-r.startReading).toFixed(1)}h</span><button onClick={()=>markBilled(r.id)} className="bg-emerald-500 text-white p-2 rounded-xl text-xs font-bold shadow-md">✓</button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function EntryForm({ machines, customers, rentals, setView }) {
            const [f, setF] = useState({c: '', nc: '', m: '', s: '', d: new Date().toISOString().split('T')[0]});

            useEffect(() => {
                if (f.m) {
                    const last = rentals.filter(r => r.machine === f.m && r.endReading).sort((a,b) => new Date(b.date)-new Date(a.date))[0];
                    setF(prev => ({...prev, s: last ? last.endReading : (machines.find(m=>m.name===f.m)?.base || 0)}));
                }
            }, [f.m, machines, rentals]);

            const save = async () => {
                const cust = f.nc.trim() || f.c;
                if (!cust || !f.m || f.s === '') return alert("Pflichtfelder fehlen!");
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                const root = firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data');
                
                await root.collection('rentals').add({ customer: cust, machine: f.m, startReading: Number(f.s), endReading: null, date: f.d, billed: false });
                if (f.nc.trim() && !customers.some(c=>c.name===cust)) await root.collection('customers').add({ name: cust });
                setView('dashboard');
            };

            return (
                <div className="bg-white p-8 rounded-[3rem] shadow-xl space-y-4">
                    <h2 className="text-xl font-black italic uppercase border-b-4 border-amber-500 inline-block pb-1">Neuaufnahme</h2>
                    <select className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none" value={f.c} onChange={e=>setF({...f, c:e.target.value, nc:''})}>
                        <option value="">Kunde wählen...</option>{customers.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                    </select>
                    <input className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none" placeholder="Oder neuer Name..." value={f.nc} onChange={e=>setF({...f, nc:e.target.value, c:''})} />
                    <select className="w-full bg-slate-50 p-4 rounded-2xl font-bold outline-none" value={f.m} onChange={e=>setF({...f, m:e.target.value})}>
                        <option value="">Gerät wählen...</option>{machines.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
                    </select>
                    <div className="text-center"><label className="text-[10px] font-black uppercase text-slate-400">Start (h)</label><input type="number" className="w-full bg-slate-100 p-4 rounded-2xl font-black text-2xl text-amber-600 text-center outline-none" value={f.s} onChange={e=>setF({...f, s:e.target.value})} /></div>
                    <button onClick={save} className="w-full bg-slate-950 text-white py-5 rounded-3xl font-black italic shadow-2xl active:scale-95 transition-transform uppercase tracking-widest">SPEICHERN</button>
                </div>
            );
        }

        function History({ rentals }) {
            const del = async (id) => {
                if(confirm("Diesen Eintrag wirklich löschen?")) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                    await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('rentals').doc(id).delete();
                }
            };
            return (
                <div className="space-y-4">
                    <h2 className="font-black italic uppercase text-slate-400 text-[10px] tracking-widest px-2">Verlauf</h2>
                    {rentals.length === 0 ? <p className="text-center text-slate-300 py-8 font-bold">KEINE EINTRÄGE</p> : rentals.map(r => (
                        <div key={r.id} className={`bg-white p-5 rounded-[2rem] shadow-sm border-l-8 ${r.endReading ? 'border-emerald-500' : 'border-amber-500 animate-pulse'}`}>
                            <div className="flex justify-between items-center">
                                <div className="truncate pr-4 leading-none"><div className="font-black uppercase italic truncate">{r.customer}</div><div className="text-[10px] font-bold text-slate-400 uppercase">{r.machine}</div></div>
                                <div className="text-right shrink-0">
                                    <div className="font-black text-amber-500 text-lg">{r.endReading ? (r.endReading-r.startReading).toFixed(1)+'h' : 'LÄUFT'}</div>
                                    <button onClick={()=>del(r.id)} className="text-rose-300 text-[10px] font-bold uppercase mt-1">Löschen</button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function ListView({ title, items, coll, showBase }) {
            const [val, setVal] = useState('');
            const [base, setBase] = useState('');
            const add = async () => {
                if(!val) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                const root = firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data');
                const data = { name: val }; if(showBase) data.base = Number(base)||0;
                await root.collection(coll).add(data);
                setVal(''); setBase('');
            };
            const del = async (id) => {
                if(confirm("Löschen?")) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'maschinenprofi-stmk';
                    await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection(coll).doc(id).delete();
                }
            };
            return (
                <div className="space-y-4">
                    <h2 className="font-black italic uppercase text-slate-400 text-[10px] tracking-widest px-2">{title}</h2>
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm">
                        <div className="flex gap-2 mb-4"><input className="flex-1 bg-slate-50 p-3 rounded-xl font-bold text-sm outline-none" value={val} onChange={e=>setVal(e.target.value)} placeholder="Neu..." />{showBase && <input className="w-16 bg-slate-50 p-3 rounded-xl font-bold text-sm text-center outline-none" value={base} onChange={e=>setBase(e.target.value)} placeholder="h" />}<button onClick={add} className="bg-slate-950 text-amber-500 p-3 rounded-xl font-bold">+</button></div>
                        <div className="space-y-2 max-h-[50vh] overflow-y-auto">{items.map(i => (<div key={i.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl text-sm font-bold"><span>{i.name} {showBase && <span className="text-[10px] text-slate-400">({i.base}h)</span>}</span><button onClick={()=>del(i.id)} className="text-rose-400 font-black px-2">X</button></div>))}</div>
                    </div>
                </div>
            );
        }

        function NavBtn({ icon, label, onClick, active, primary }) {
            return (
                <button onClick={onClick} className={`flex-1 flex flex-col items-center justify-center gap-1 transition-all ${active ? 'text-amber-500' : 'text-slate-500'} ${primary ? 'bg-amber-500 !text-slate-950 h-full border-x border-slate-800' : ''}`}>
                    <span>{icon}</span><span className="text-[10px] font-black uppercase tracking-widest leading-none mt-1">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
